name: poe2tracker

# Крутится на серверах GitHub — не на твоём ПК. Расписание в UTC.
on:
  schedule:
    - cron: "*/30 * * * *"      # каждые 30 минут (экономика). Билды сами гейтятся на 12ч.
  workflow_dispatch:             # кнопка «запустить вручную» во вкладке Actions

# чтобы параллельные запуски не топтали друг друга
concurrency:
  group: poe2tracker
  cancel-in-progress: false

permissions:
  contents: write        # чтобы бот мог коммитить docs/data.json

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      # Восстанавливаем БД с прошлого прогона (для моментума/истории нужна непрерывность).
      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: poe2tracker.db
          key: poe2-db-${{ github.run_id }}
          restore-keys: |
            poe2-db-

      - name: Run tracker
        env:
          POE2_CONTACT:          ${{ secrets.POE2_CONTACT }}
          POE2_LEAGUE:           ${{ secrets.POE2_LEAGUE }}   # можно не задавать — определится сама
          POE2_DISCORD_WEBHOOK:  ${{ secrets.POE2_DISCORD_WEBHOOK }}
          POE2_TELEGRAM_TOKEN:   ${{ secrets.POE2_TELEGRAM_TOKEN }}
          POE2_TELEGRAM_CHAT:    ${{ secrets.POE2_TELEGRAM_CHAT }}
          POE2_DB: poe2tracker.db
        run: python run.py --once

      # Публикуем свежий docs/data.json обратно в репозиторий -> GitHub Pages его отдаёт.
      - name: Commit dashboard data
        if: always()
        run: |
          git config user.name  "poe2tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f docs/data.json || true
          git commit -m "data: update $(date -u +%FT%TZ)" || echo "нет изменений"
          git push || echo "push пропущен"

      # Сохраняем обновлённую БД под уникальным ключом (cache immutable по ключу).
      - name: Save DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: poe2tracker.db
          key: poe2-db-${{ github.run_id }}
